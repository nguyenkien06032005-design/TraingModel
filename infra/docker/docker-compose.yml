version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# SafeVision — docker-compose for local CI simulation
#
# Usage:
#   docker compose run analyze        → lint + analyze
#   docker compose run test           → full test suite with coverage
#   docker compose run test-file <path>  → run a specific test file
#   docker compose run build-android  → build debug APK
#
# All services share the pub-cache volume so `flutter pub get`
# does not need to be re-run between services.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # Base template — extended by other services via YAML anchor
  base: &base
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
      target: deps
      args:
        # Follow the stable channel; do not pin a specific version.
        # See Dockerfile for a full explanation.
        FLUTTER_CHANNEL: stable
    volumes:
      - ../..:/app:ro          # Source mounted read-only
      - pub-cache:/root/.pub-cache
      - build-cache:/app/build
    working_dir: /app

  # ── Analyze & Format ──────────────────────────────────────────────────────
  # Runs dart format check then flutter analyze.
  # Exits with a non-zero code if there are any format or lint errors.
  analyze:
    <<: *base
    command: >
      sh -c "
        echo 'Checking code format...' &&
        dart format --output=none --set-exit-if-changed lib/ test/ &&
        echo 'Running flutter analyze...' &&
        flutter analyze --fatal-infos &&
        echo 'Analysis complete'
      "

  # ── Test with coverage ────────────────────────────────────────────────────
  test:
    <<: *base
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
      target: test-runner
      args:
        FLUTTER_CHANNEL: stable
    volumes:
      - ../..:/app:ro
      - pub-cache:/root/.pub-cache
      - coverage-out:/app/coverage  # Writable for coverage output
    command: >
      sh -c "
        echo 'Running tests with coverage...' &&
        flutter test --coverage --reporter=expanded --timeout=60s test/ &&
        echo '' &&
        echo 'Coverage summary:' &&
        lcov --summary coverage/lcov.info 2>&1 | grep -E 'lines|functions|branches' &&
        echo '' &&
        echo 'Tests complete'
      "

  # ── Run a specific test file ──────────────────────────────────────────────
  # Example: docker compose run test-file test/features/tts/tts_service_fix_test.dart
  test-file:
    <<: *base
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
      target: test-runner
      args:
        FLUTTER_CHANNEL: stable
    volumes:
      - ../..:/app:ro
      - pub-cache:/root/.pub-cache
    entrypoint: flutter test --reporter=expanded

  # ── Build Android APK ─────────────────────────────────────────────────────
  # Output APKs can be found in the build-out volume after the build completes.
  build-android:
    <<: *base
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
      target: android-builder
      args:
        FLUTTER_CHANNEL: stable
    volumes:
      - ../..:/app:ro
      - pub-cache:/root/.pub-cache
      - build-out:/app/build
    command: >
      sh -c "
        echo 'Building Android APK (debug)...' &&
        flutter build apk --debug --split-per-abi &&
        echo 'Build complete' &&
        find /app/build/app/outputs/apk -name '*.apk' -exec ls -lh {} \;
      "

# ─── Volumes ──────────────────────────────────────────────────────────────────
# pub-cache   : shared across all services — no need to re-run pub get
# build-cache : caches intermediate build artifacts
# build-out   : APK output from android-builder (writable)
# coverage-out: lcov.info output from the test runner (writable)
volumes:
  pub-cache:
    driver: local
  build-cache:
    driver: local
  build-out:
    driver: local
  coverage-out:
    driver: local