# JVM arguments untuk Gradle daemon.
# -Xmx8G dan MaxMetaspaceSize besar diperlukan karena:
# 1. TFLite NDK library menghasilkan banyak native symbols saat kompilasi.
# 2. Flutter's code generation (generated_plugin_registrant) membutuhkan
#    headroom metaspace yang cukup untuk menghindari OOM saat build release.
org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError

# AndroidX — wajib untuk semua plugin Flutter modern
android.useAndroidX=true
android.enableJetifier=true