name: PR Checklist

on:
  pull_request:
    types: [opened, ready_for_review]

jobs:
  pr-checks:
    name: 📋 PR Quality Checks
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Enforce conventional commits
      - name: Validate commit messages
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.yml

      # Check PR has linked issue
      - name: Check PR body for issue link
        run: |
          if ! echo "${{ github.event.pull_request.body }}" | grep -qE "(Closes|Fixes|Resolves) #[0-9]+"; then
            echo "⚠️ PR body should reference an issue (Closes #123)"
            # Non-blocking: just warn
          fi

      # Warn if PR is too large
      - name: Check PR size
        run: |
          CHANGED=$(git diff --stat origin/${{ github.base_ref }}...HEAD | tail -1)
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | wc -l)
          echo "Changed files: $FILES"
          if [ "$FILES" -gt 30 ]; then
            echo "⚠️ This PR changes $FILES files — consider splitting into smaller PRs"
          fi

      # Auto-label based on changed paths
      - name: Auto-label PR
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
