name: safe_vision_app
description: "Dự án SafeVision - Hỗ trợ người khiếm thị nhận diện vật thể"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  get_it: ^8.0.3
  flutter_tts: ^4.2.2
  vibration: ^2.0.1
  camera: ^0.10.6
  tflite_flutter: ^0.11.0
  permission_handler: ^11.3.1
  path_provider: ^2.1.3
  path: ^1.9.0
  image: ^4.7.2
  shared_preferences: ^2.5.3
  bloc_concurrency: ^0.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^10.0.0      # moved here
  mocktail: ^1.0.4        # moved here
  flutter_lints: ^5.0.0   # moved here

flutter:
  uses-material-design: true
  assets:
    - assets/models/labels.txt
    - assets/models/yolov8n_safevision.tflite
    - assets/icons/sv_icon.png
    - assets/images/sv_logo.png